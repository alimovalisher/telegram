services:
  pulsar:
    image: apachepulsar/pulsar:3.3.3
    container_name: pulsar-standalone
    ports:
      - "6650:6650"
      - "8080:8080"
    command: bin/pulsar standalone
    environment:
      PULSAR_MEM: "-Xms512m -Xmx1G -XX:MaxDirectMemorySize=256m"
    healthcheck:
      test: [ "CMD", "bin/pulsar-admin", "brokers", "healthcheck" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
